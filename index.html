<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker Deluxe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
}

#big {
  font-size: 60px;
  text-align: center;
  margin-top: 10px;
}

/* MENU */
#top {
  position: absolute;
  top: 80px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

/* CENTER */
#main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#cola {
  font-size: 170px;
  cursor: pointer;
  user-select: none;
}

/* FLOAT FIXED (NO COPYING BUG) */
.float {
  position: fixed;
  font-weight: bold;
  color: #00ff88;
  animation: floatUp 1s forwards;
  pointer-events: none;
  text-shadow: 0 0 10px #00ff88;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-140px) scale(1.4); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 120px;
  left: 10px;
  width: 280px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* SETTINGS */
input {
  width: 100%;
}
</style>
</head>

<body>

<div id="hud">
🥤 Cola: <span id="colaCount">0</span>
</div>

<div id="big">
TOTAL: <span id="allTime">0</span>
</div>

<div id="top">
  <button onclick="openTab('shop')">Upgrades</button>
  <button onclick="openTab('settings')">Settings</button>
</div>

<div id="shop" class="panel">
  <h3>⚡ Click Upgrades</h3>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyGalaxy()">Galaxy Click +100 (500)</button>

  <hr>

  <h3>🤖 Auto Upgrades</h3>
  <button onclick="buyAuto()">Auto Cola (25)</button>
  <button onclick="buyFactory()">Factory +30/s (200)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>

  <p>Music</p>
  <button onclick="toggleMusic()">Toggle Music</button>

  <p>SFX</p>
  <button onclick="toggleSFX()">Toggle SFX</button>

  <p>Volume</p>
  <input type="range" min="0" max="1" step="0.1" onchange="setVol(this.value)">
</div>

<div id="main">
  <div id="cola">🥤</div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;

/* AUDIO */
let musicOn = true;
let sfxOn = true;
let volume = 0.3;

/* SIMPLE AUDIO ENGINE */
let music = new Audio();
music.loop = true;
music.volume = volume;
music.src = "https://cdn.pixabay.com/audio/2022/10/16/audio_12b5f1b8a1.mp3";

/* CLICK SOUND (synthetic) */
function clickSound(){
  if(!sfxOn) return;
  let a = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c1b6d4b4d4.mp3");
  a.volume = volume;
  a.play();
}

/* MUSIC */
music.play();

/* CLICK */
document.getElementById("cola").onclick = (e) => {
  let gain = clickPower;

  cola += gain;
  allTime += gain;

  clickSound();
  float(e, gain);

  update();
};

/* FLOAT FIX (no copy bug) */
function float(e,val){
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + val;

  let x = e.clientX + (Math.random()*40 - 20);
  let y = e.clientY + (Math.random()*40 - 20);

  f.style.left = x + "px";
  f.style.top = y + "px";

  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* UPGRADES */
function buyClick(){ if(cola>=10){ cola-=10; clickPower++; update(); } }
function buyGalaxy(){ if(cola>=500){ cola-=500; clickPower+=100; update(); } }

function buyAuto(){ if(cola>=25){ cola-=25; auto++; update(); } }
function buyFactory(){ if(cola>=200){ cola-=200; auto+=30; update(); } }

/* AUTO */
setInterval(()=>{
  cola += auto;
  allTime += auto;
  update();
},1000);

/* TABS */
function openTab(id){
  ["shop","settings"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* AUDIO CONTROLS */
function toggleMusic(){
  musicOn = !musicOn;
  if(musicOn) music.play();
  else music.pause();
}

function toggleSFX(){
  sfxOn = !sfxOn;
}

function setVol(v){
  volume = v;
  music.volume = v;
}

/* UPDATE */
function update(){
  document.getElementById("colaCount").innerText = cola;
  document.getElementById("allTime").innerText = allTime;
}
</script>

</body>
</html>
