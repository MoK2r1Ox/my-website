<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker Deluxe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
}

/* TOP MENU */
#top {
  position: absolute;
  top: 40px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  background: #333;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* CENTER */
#main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#cola {
  font-size: 150px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
}

#cola:active {
  transform: scale(0.9);
}

/* FLOAT */
.float {
  position: fixed;
  color: #00ff88;
  font-size: 20px;
  font-weight: bold;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-120px); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 90px;
  left: 10px;
  width: 260px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* PRESTIGE POPUP */
#prestigeModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

#prestigeBox {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
  text-align: center;
}

.green { color: #00ff88; }
.red { color: #ff4444; }
</style>
</head>

<body>

<div id="hud">
🥤 Cola: <span id="colaCount">0</span>
</div>

<div id="top">
  <button onclick="openTab('shop')">Upgrades</button>
  <button onclick="openTab('settings')">Settings</button>
  <button onclick="openTab('leader')">Leaderboard</button>
  <button onclick="openPrestige()">Prestige ⭐</button>
</div>

<div id="shop" class="panel">
  <h3>Upgrades</h3>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyAuto()">Auto Cola (25)</button>

  <hr>

  <button onclick="buyFactory()">Coke Factory (200)</button>
  <button onclick="buyGalaxy()">Galaxy Cola (500)</button>

  <!-- POST PRESTIGE -->
  <button onclick="buyQuantum()">Quantum Factory (2000)</button>
  <button onclick="buyReactor()">Cola Reactor (3000)</button>
  <button onclick="buyHyper()">Hyper Click Engine (5000)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>
  <p>All-time cola: <span id="allTime">0</span></p>
  <p>Prestige: <span id="prestige">0</span></p>
</div>

<div id="leader" class="panel">
  <h3>Leaderboard</h3>
  <div id="board"></div>
</div>

<div id="main">
  <div id="cola">🥤</div>
</div>

<!-- PRESTIGE -->
<div id="prestigeModal">
  <div id="prestigeBox">
    <h2>Prestige?</h2>

    <p>Requirement: <b>35,000 cola</b></p>

    <p class="green">✔ +30% permanent boost</p>
    <p class="green">✔ Unlock 3 new upgrades</p>
    <p class="red">❌ Reset all upgrades</p>

    <button onclick="doPrestige()">YES</button>
    <button onclick="closePrestige()">NO</button>
  </div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;
let prestige = 0;
let boost = 1;

/* CLICK */
document.getElementById("cola").onclick = (e) => {

  // 🔥 STRONGER STREAK FARMING
  if(!window.streak) window.streak = 0;
  if(!window.last) window.last = 0;

  let now = Date.now();

  if(now - window.last < 650) window.streak++;
  else window.streak = 1;

  window.last = now;

  // 🔥 HARDER SCALING (more reward)
  let mult = 1 + Math.min(window.streak * 0.08, 0.8);

  let gain = clickPower * mult * boost;

  cola += gain;
  allTime += gain;

  float(e, gain);

  update();
};

/* FLOAT */
function float(e,val){
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + val.toFixed(1);

  f.style.left = e.clientX + "px";
  f.style.top = e.clientY + "px";

  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* UPGRADES */
function buyClick(){ if(cola>=10){ cola-=10; clickPower++; update(); } }
function buyAuto(){ if(cola>=25){ cola-=25; auto++; update(); } }

function buyFactory(){ if(cola>=200){ cola-=200; auto+=30; update(); } }
function buyGalaxy(){ if(cola>=500){ cola-=500; clickPower+=100; update(); } }

/* POST PRESTIGE */
function buyQuantum(){ if(cola>=2000){ cola-=2000; auto+=200; update(); } }
function buyReactor(){ if(cola>=3000){ cola-=3000; boost+=0.05; update(); } }
function buyHyper(){ if(cola>=5000){ cola-=5000; clickPower+=500; update(); } }

/* AUTO */
setInterval(()=>{
  cola += auto * boost;
  allTime += auto * boost;
  update();
},1000);

/* TABS */
function openTab(id){
  ["shop","settings","leader"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* PRESTIGE */
function openPrestige(){
  document.getElementById("prestigeModal").style.display="flex";
}

function closePrestige(){
  document.getElementById("prestigeModal").style.display="none";
}

function doPrestige(){
  if(allTime < 35000){
    alert("Need 35,000 cola!");
    return;
  }

  prestige++;
  boost *= 1.3;

  cola = 0;
  clickPower = 1;
  auto = 0;

  window.streak = 0;

  closePrestige();
  update();
}

/* LEADERBOARD */
function updateBoard(){
  let fake = [
    ["You", allTime],
    ["Player2", 5000],
    ["Player3", 3000]
  ];

  fake.sort((a,b)=>b[1]-a[1]);

  document.getElementById("board").innerHTML =
    fake.map(p=>`<p>${p[0]} - ${p[1].toFixed(0)}</p>`).join("");
}

/* UPDATE */
function update(){
  document.getElementById("colaCount").innerText = Math.floor(cola);
  document.getElementById("allTime").innerText = Math.floor(allTime);
  document.getElementById("prestige").innerText = prestige;
  updateBoard();
}
</script>

</body>
</html>
