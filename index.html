<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker Deluxe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* TOP HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

/* TOP MENU */
#top {
  position: absolute;
  top: 40px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

/* CENTER */
#main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#cola {
  font-size: 150px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
}

#cola:active {
  transform: scale(0.9);
}

/* 💥 FLOATING NUMBERS (better) */
.float {
  position: fixed;
  font-weight: bold;
  animation: floatUp 1s forwards;
  pointer-events: none;
  text-shadow: 0 0 10px rgba(0,255,100,0.8);
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 90px;
  left: 10px;
  width: 260px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* 🔥 STREAK HUD */
#streakHUD {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 240px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
}

#bar {
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  margin-top: 5px;
}

#fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ff88, #00aaff);
  transition: width 0.15s;
}
</style>
</head>

<body>

<!-- 🥤 TOP HUD -->
<div id="hud">
  🥤 Cola: <span id="colaCount">0</span>
</div>

<div id="top">
  <button onclick="openTab('shop')">Upgrades</button>
  <button onclick="openTab('settings')">Settings</button>
  <button onclick="openTab('leader')">Leaderboard</button>
  <button onclick="openPrestige()">Prestige ⭐</button>
</div>

<div id="shop" class="panel">
  <h3>Upgrades</h3>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyAuto()">Auto Cola (25)</button>
  <button onclick="buyFactory()">Coke Factory (200)</button>
  <button onclick="buyGalaxy()">Galaxy Cola (500)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>
  <p>All-time cola: <span id="allTime">0</span></p>
  <p>Prestige: <span id="prestige">0</span></p>
</div>

<div id="leader" class="panel">
  <h3>Leaderboard</h3>
  <div id="board"></div>
</div>

<div id="main">
  <div id="cola">🥤</div>
</div>

<!-- 🔥 STREAK HUD (RESTORED) -->
<div id="streakHUD">
  <div>Streak: <span id="multi">1.00x</span></div>
  <div id="bar"><div id="fill"></div></div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;
let prestigeLevel = 0;
let boost = 1;

let streak = 0;
let lastClick = 0;

const colaBtn = document.getElementById("cola");

/* CLICK */
colaBtn.onclick = (e) => {
  let now = Date.now();

  // 🔥 FAST STREAK BUILD (7 clicks max feel)
  if (now - lastClick < 650) streak++;
  else streak = 1;

  lastClick = now;

  let multiplier = 1 + Math.min(streak * 0.07, 0.5); // max ~1.5x

  let gain = clickPower * multiplier * boost;

  cola += gain;
  allTime += gain;

  showFloat(e, gain);

  updateStreak(multiplier);
  update();
};

/* 💥 CLICK FX */
function showFloat(e, text){
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + text.toFixed(1);

  let x = e.clientX + (Math.random() * 20 - 10);
  let y = e.clientY + (Math.random() * 20 - 10);

  f.style.left = x + "px";
  f.style.top = y + "px";

  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* 🔥 STREAK UI */
function updateStreak(mult){
  document.getElementById("multi").innerText = mult.toFixed(2) + "x";

  let percent = Math.min((streak / 7) * 100, 100);
  document.getElementById("fill").style.width = percent + "%";
}

/* UPGRADES */
function buyClick(){
  if(cola >= 10){
    cola -= 10;
    clickPower++;
    update();
  }
}

function buyAuto(){
  if(cola >= 25){
    cola -= 25;
    auto++;
    update();
  }
}

function buyFactory(){
  if(cola >= 200){
    cola -= 200;
    auto += 30;
    update();
  }
}

function buyGalaxy(){
  if(cola >= 500){
    cola -= 500;
    clickPower += 100;
    update();
  }
}

/* AUTO */
setInterval(()=>{
  cola += auto * boost;
  allTime += auto * boost;
  update();
},1000);

/* PANELS */
function openTab(id){
  ["shop","settings","leader"].forEach(p=>{
    document.getElementById(p).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

/* LEADERBOARD */
function updateBoard(){
  let fake = [
    ["You", allTime],
    ["Player2", 5000],
    ["Player3", 3000]
  ];

  fake.sort((a,b)=>b[1]-a[1]);

  document.getElementById("board").innerHTML =
    fake.map(p=>`<p>${p[0]} - ${p[1].toFixed(0)}</p>`).join("");
}

/* PRESTIGE */
function openPrestige(){
  if(allTime < 1000){
    alert("Need 1000 cola!");
    return;
  }

  prestigeLevel++;
  boost *= 1.3;

  cola = 0;
  clickPower = 1;
  auto = 0;
  streak = 0;

  update();
}

/* UPDATE */
function update(){
  document.getElementById("colaCount").innerText = Math.floor(cola);
  document.getElementById("allTime").innerText = Math.floor(allTime);
  document.getElementById("prestige").innerText = prestigeLevel;
  updateBoard();
}
</script>

</body>
</html>
