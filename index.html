<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥤 COLA ASCENSION | Prestige & Smooth Animations</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0f1722, #03050b);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
            color: #f0ede8;
            overflow-x: hidden;
        }

        /* Modern glass HUD */
        .hud {
            position: fixed;
            top: 18px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            pointer-events: none;
        }
        .hud-card {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(16px);
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 180, 70, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            pointer-events: auto;
            font-family: monospace;
        }
        .hud-card span { color: #ffbc6e; font-size: 1.3rem; }

        /* Streak bar */
        .streak-container {
            position: fixed;
            top: 95px;
            left: 24px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 8px 24px;
            border-radius: 80px;
            border-left: 4px solid #ffaa44;
            box-shadow: 0 0 18px rgba(255, 170, 68, 0.3);
            z-index: 100;
            font-weight: bold;
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-size: 0.95rem;
        }
        .streak-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffdd99;
            text-shadow: 0 0 8px #ffaa33;
            line-height: 1;
        }
        .streak-mult {
            background: #ffaa3322;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcc77;
        }

        /* Rebirth badge */
        .rebirth-badge {
            position: fixed;
            top: 95px;
            right: 24px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 8px 22px;
            border-radius: 60px;
            border-right: 3px solid #c084fc;
            font-weight: bold;
            font-size: 0.9rem;
            font-family: monospace;
            z-index: 100;
        }

        /* Menu */
        .menu-bar {
            position: fixed;
            bottom: 28px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 14px;
            z-index: 200;
        }
        .menu-btn {
            background: #1e2a36dd;
            backdrop-filter: blur(12px);
            border: 1px solid #ffaa6655;
            padding: 10px 26px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffefcf;
            cursor: pointer;
            transition: 0.15s ease;
            font-family: monospace;
        }
        .menu-btn:active { transform: scale(0.94); background: #3e3a2f; }

        /* COLA CENTER with 3D smoothness */
        .cola-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .cola-icon {
            font-size: 210px;
            cursor: pointer;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)) drop-shadow(0 0 18px rgba(255,120,30,0.5));
            transition: all 0.08s cubic-bezier(0.2, 1.2, 0.8, 1);
            display: inline-block;
            background: none;
            transform-origin: center;
        }
        .cola-icon:active {
            transform: scale(0.92);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)) drop-shadow(0 0 32px #ff8844);
        }

        /* Panels */
        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            max-width: 88vw;
            background: #0e1724f2;
            backdrop-filter: blur(28px);
            border-radius: 44px;
            padding: 22px 20px;
            border: 1px solid #ffaa6680;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 12px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .panel h3 { margin: 0 0 6px; text-align: center; color: #ffcf9a; font-weight: 600; }
        .panel button {
            background: #3e2a1f;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .panel button:active { transform: scale(0.97); background: #5e3e2a; }
        .close-panel { background: #7a3a28 !important; margin-top: 8px; }
        hr { border-color: #ffb34760; margin: 8px 0; }

        .prestige-card {
            background: #1e293bcc;
            border-left: 5px solid #ffb347;
            padding: 14px;
            border-radius: 28px;
            margin: 8px 0;
        }
        .leaderboard-entry {
            background: #00000066;
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .float-text {
            position: fixed;
            font-weight: 800;
            background: linear-gradient(135deg, #ffdd99, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
            animation: floatSmooth 1.1s forwards;
            pointer-events: none;
            font-size: 1.7rem;
            z-index: 1000;
            white-space: nowrap;
        }
        @keyframes floatSmooth {
            0% { opacity: 1; transform: translateY(0px) scale(0.7); filter: blur(0);}
            100% { opacity: 0; transform: translateY(-130px) scale(1.3); filter: blur(2px);}
        }
        @keyframes colaPopGlow {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px #ffaa44);}
            40% { transform: scale(1.12); filter: drop-shadow(0 0 40px #ff8844);}
            100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,100,30,0.6));}
        }
        .cola-click-anim {
            animation: colaPopGlow 0.12s cubic-bezier(0.2, 1.4, 0.6, 1);
        }
        .streak-pulse {
            animation: streakPulse 0.2s ease-out;
        }
        @keyframes streakPulse {
            0% { box-shadow: 0 0 0px gold; background: rgba(255,200,0,0);}
            100% { box-shadow: 0 0 28px #ffcc44; background: rgba(255,200,0,0.2);}
        }
        .rebirth-ascend {
            animation: rebirthGlow 0.7s cubic-bezier(0.2, 1, 0.3, 1);
        }
        @keyframes rebirthGlow {
            0% { filter: drop-shadow(0 0 0px gold) scale(1);}
            50% { filter: drop-shadow(0 0 70px #ffcc55) scale(1.18);}
            100% { filter: drop-shadow(0 0 20px #ffaa44) scale(1);}
        }
        .warning-toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444ee;
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 80px;
            font-weight: bold;
            z-index: 400;
            animation: fadeOutUp 2s forwards;
            pointer-events: none;
        }
        @keyframes fadeOutUp {
            0% { opacity: 1; bottom: 40px; }
            70% { opacity: 1; }
            100% { opacity: 0; bottom: 100px; visibility: hidden; }
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            background: #ffaa4422;
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #2a2a2a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffaa66; border-radius: 10px; }
    </style>
</head>
<body>

<div class="hud">
    <div class="hud-card">🥤 COLA: <span id="colaCount">0</span></div>
    <div class="hud-card">📈 TOTAL: <span id="allTime">0</span></div>
</div>

<div class="streak-container">
    🔥 COMBO: <span class="streak-number" id="streakValue">0</span>
    <div class="streak-mult">✧ <span id="streakMult">1.00</span>x ✧</div>
</div>
<div class="rebirth-badge" id="rebirthBadge">
    🌀 REBIRTH <span id="rebirthTier">0</span> &nbsp;| 💪 +<span id="globalBonus">0</span>%
</div>

<div class="menu-bar">
    <button class="menu-btn" onclick="openPanel('shopPanel')">🏪 UPGRADES</button>
    <button class="menu-btn" onclick="openPanel('rebirthPanel')">🌀 REBIRTH</button>
    <button class="menu-btn" onclick="openPanel('leaderPanel')">🏆 LEADERBOARD</button>
    <button class="menu-btn" onclick="openPanel('settingsPanel')">⚙️ SETTINGS</button>
</div>

<!-- UPGRADES PANEL -->
<div id="shopPanel" class="panel">
    <h3>✨ CLICKER UPGRADES</h3>
    <button onclick="buyClickUpgrade()">🔨 +1 Base Click (Cost: <span id="clickCost">10</span>)</button>
    <button onclick="buyQuantum()">⚡ Quantum Core +50 (Cost: <span id="quantumCost">450</span>)</button>
    <hr>
    <h3>🏭 AUTO COLA</h3>
    <button onclick="buyAuto()">🥤 Auto Siphon +1/s (Cost: <span id="autoCost">30</span>)</button>
    <button onclick="buyFactory()">🏭 Bottling +8/s (Cost: <span id="factoryCost">220</span>)</button>
    <button onclick="buyMega()">🌀 Mega Tank +50/s (Cost: <span id="megaCost">1200</span>)</button>
    <hr id="prestigeDiv" style="display: none;">
    <div id="relicContainer">
        <h3 id="relicTitle" style="display: none;">🌟 ASCENDED RELICS</h3>
        <button id="relic1" style="display: none; background:#5e3a6a;" onclick="buyRelic(1)">🌌 Galaxy Relic +15% (Cost: <span id="relic1Cost">800</span>)</button>
        <button id="relic2" style="display: none; background:#2a5f6a;" onclick="buyRelic(2)">💫 Nebula Core +25% (Cost: <span id="relic2Cost">5000</span>)</button>
        <button id="relic3" style="display: none; background:#8a6a2a;" onclick="buyRelic(3)">👑 Stellar Crown +50% (Cost: <span id="relic3Cost">25000</span>)</button>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">✖ CLOSE</button>
</div>

<!-- REBIRTH PANEL -->
<div id="rebirthPanel" class="panel">
    <h3>🌀 TRANSCEND & EVOLVE</h3>
    <div class="prestige-card" id="rebirthDescCard">
        <div id="rebirthDesc"></div>
        <button id="rebirthBtn" onclick="performRebirth()" style="margin-top:12px;">✨ ASCEND NOW</button>
        <div id="rebirthReq" style="margin-top:8px; font-size:0.8rem;"></div>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<!-- LEADERBOARD PANEL -->
<div id="leaderPanel" class="panel">
    <h3>🏆 TOP 25 COLA LEGENDS</h3>
    <div class="leaderboard-header"><span>#</span><span>NAME</span><span>ALL-TIME</span></div>
    <div id="leaderList" style="max-height:55vh; overflow-y:auto;">Loading...</div>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel" class="panel">
    <h3>🎛️ AUDIO & VISUALS</h3>
    <button onclick="toggleMusic()">🎵 Toggle Music</button>
    <button onclick="toggleSFX()">🔊 Toggle SFX</button>
    <p>🔊 Volume</p>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.3">
    <hr>
    <p><em>🔥 Streak: +1% per click, max +100% (2x multiplier)</em><br>🛡️ Anti-auto-clicker active</p>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<div class="cola-stage">
    <div class="cola-icon" id="colaMain">🧃</div>
</div>

<script>
    // ========== GAME STATE ==========
    let cola = 0;
    let totalAllTime = 0;
    let clickPower = 1;
    let quantum = false;
    let autoCount = 0, factoryCount = 0, megaCount = 0;
    
    let rebirthLevel = 0;        // 0,1,2,3
    let permBonus = 0;           // +% bonus
    
    let relics = [false, false, false]; // index 1,2,3
    let relicCosts = [0, 800, 5000, 25000];
    
    // upgrade costs
    let clickUpgradeLvl = 0;
    let clickCostBase = 10;
    let quantumCost = 450;
    let autoCost = 30, factoryCost = 220, megaCost = 1200;
    
    // STREAK
    let streak = 0;
    let streakMulti = 1.0;
    
    // leaderboard
    let leaderboard = [];
    let playerName = "";
    
    // Audio
    let musicOn = true, sfxOn = true, volume = 0.3;
    let music = new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12b5f1b8a1.mp3");
    music.loop = true;
    music.volume = volume;
    
    // anti auto-clicker
    let clickLog = [];
    let locked = false;
    let lockTimer = null;
    const MAX_CPS = 12;
    
    function antiClickCheck() {
        let now = Date.now();
        clickLog.push(now);
        if(clickLog.length > 15) clickLog.shift();
        let recent = clickLog.filter(t => now - t <= 1000);
        if(recent.length > MAX_CPS && !locked) {
            locked = true;
            showToast("⚠️ AUTO-CLICKER LOCKED! 1.8s penalty");
            if(lockTimer) clearTimeout(lockTimer);
            lockTimer = setTimeout(() => { locked = false; clickLog = []; showToast("🔓 Unlocked"); }, 1800);
            return false;
        }
        return !locked;
    }
    
    function showToast(msg) {
        let d = document.createElement("div");
        d.className = "warning-toast";
        d.innerText = msg;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 2100);
    }
    
    function playSFX() { if(sfxOn && !locked) { let s = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c1b6d4b4d4.mp3"); s.volume = volume; s.play().catch(e=>{}); } }
    function playUpgradeSound() { if(sfxOn) { let s = new Audio("https://cdn.pixabay.com/audio/2022/05/16/audio_8b6a7c8f2c.mp3"); s.volume = volume; s.play().catch(e=>{}); } }
    music.play().catch(()=>{});
    
    // multipliers
    function totalGlobalMult() {
        let bonus = permBonus;
        if(relics[1]) bonus += 15;
        if(relics[2]) bonus += 25;
        if(relics[3]) bonus += 50;
        return 1 + bonus / 100;
    }
    
    function getClickGain() {
        let base = clickPower + (quantum ? 50 : 0);
        return Math.floor(base * streakMulti * totalGlobalMult());
    }
    
    function getAutoIncome() {
        let auto = autoCount + (factoryCount * 8) + (megaCount * 50);
        return Math.floor(auto * totalGlobalMult());
    }
    
    // STREAK UPDATE
    function updateStreak() {
        if(streak < 100) streak++;
        streakMulti = 1 + (streak / 100);
        if(streakMulti > 2.0) streakMulti = 2.0;
        let streakDiv = document.querySelector(".streak-container");
        streakDiv.classList.add("streak-pulse");
        setTimeout(() => streakDiv.classList.remove("streak-pulse"), 200);
    }
    
    let idleTimer;
    function resetStreakIdle() {
        if(streak > 0) {
            streak = 0;
            streakMulti = 1.0;
            floatingText("💔 Streak broken!", window.innerWidth/2, 100);
            updateUI();
        }
    }
    function restartIdleTimer() {
        if(idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => resetStreakIdle(), 5500);
    }
    
    // EVOLVING COLA ICONS (better looking after each rebirth)
    function getColaIcon() {
        if(rebirthLevel === 0) return "🧃";      // juice box / classic
        if(rebirthLevel === 1) return "🍷";      // galaxy dark elegant
        if(rebirthLevel === 2) return "🍾";      // nebula sparkling
        return "🏆";                             // stellar trophy
    }
    
    function getColaName() {
        if(rebirthLevel === 0) return "Classic Cola";
        if(rebirthLevel === 1) return "Galaxy Cola";
        if(rebirthLevel === 2) return "Nebula Cola";
        return "Stellar Cola";
    }
    
    // Leaderboard logic
    function saveToLeaderboard() {
        if(!playerName) {
            let saved = localStorage.getItem("colaPlayer");
            if(saved) playerName = saved;
            else {
                playerName = prompt("Enter your name (Leaderboard):", "ColaMaster") || "Guest";
                playerName = playerName.slice(0, 14);
                localStorage.setItem("colaPlayer", playerName);
            }
        }
        let stored = localStorage.getItem("colaLeaderboard");
        let board = stored ? JSON.parse(stored) : [];
        let existing = board.find(p => p.name === playerName);
        if(existing) existing.score = totalAllTime;
        else board.push({ name: playerName, score: totalAllTime });
        board.sort((a,b) => b.score - a.score);
        board = board.slice(0, 25);
        localStorage.setItem("colaLeaderboard", JSON.stringify(board));
        leaderboard = board;
        renderLeaderboard();
    }
    
    function renderLeaderboard() {
        let container = document.getElementById("leaderList");
        if(!container) return;
        if(leaderboard.length === 0) { container.innerHTML = "<div style='padding:20px;text-align:center'>Be the first legend!</div>"; return; }
        let html = "";
        leaderboard.forEach((entry, idx) => {
            let medal = idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`#${idx+1}`;
            html += `<div class="leaderboard-entry">
                        <span style="width:45px;">${medal}</span>
                        <span style="flex:1; text-align:left;">${escapeHtml(entry.name)}</span>
                        <span style="color:#88ffaa;">${Math.floor(entry.score).toLocaleString()}</span>
                    </div>`;
        });
        container.innerHTML = html;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    // UI UPDATE + relic visibility
    function updateUI() {
        document.getElementById("colaCount").innerText = Math.floor(cola);
        document.getElementById("allTime").innerText = Math.floor(totalAllTime);
        document.getElementById("streakValue").innerText = streak;
        document.getElementById("streakMult").innerText = streakMulti.toFixed(2);
        document.getElementById("rebirthTier").innerText = rebirthLevel;
        document.getElementById("globalBonus").innerText = permBonus;
        document.getElementById("clickCost").innerText = clickCostBase;
        document.getElementById("quantumCost").innerText = quantumCost;
        document.getElementById("autoCost").innerText = autoCost;
        document.getElementById("factoryCost").innerText = factoryCost;
        document.getElementById("megaCost").innerText = megaCost;
        
        let relicDiv = document.getElementById("prestigeDiv");
        let relicTitle = document.getElementById("relicTitle");
        let btn1 = document.getElementById("relic1");
        let btn2 = document.getElementById("relic2");
        let btn3 = document.getElementById("relic3");
        if(rebirthLevel >= 1) { relicDiv.style.display = "block"; relicTitle.style.display = "block"; btn1.style.display = "block"; btn1.disabled = relics[1]; document.getElementById("relic1Cost").innerText = relicCosts[1]; } else btn1.style.display = "none";
        if(rebirthLevel >= 2) { btn2.style.display = "block"; btn2.disabled = relics[2]; document.getElementById("relic2Cost").innerText = relicCosts[2]; } else btn2.style.display = "none";
        if(rebirthLevel >= 3) { btn3.style.display = "block"; btn3.disabled = relics[3]; document.getElementById("relic3Cost").innerText = relicCosts[3]; } else btn3.style.display = "none";
        
        // update rebirth panel text
        let rebirthDesc = document.getElementById("rebirthDesc");
        let rebirthBtn = document.getElementById("rebirthBtn");
        let reqDiv = document.getElementById("rebirthReq");
        if(rebirthLevel === 0) {
            rebirthDesc.innerHTML = `<strong>🌀 1st REBIRTH: GALAXY COLA</strong><br>+30% permanent bonus<br>🧃 → 🍷<br>Requires 10,000 total cola`;
            rebirthBtn.disabled = !(totalAllTime >= 10000);
            reqDiv.innerText = totalAllTime>=10000 ? "✅ READY" : `Need ${10000-totalAllTime} more`;
        } else if(rebirthLevel === 1) {
            rebirthDesc.innerHTML = `<strong>🌀 2nd REBIRTH: NEBULA COLA</strong><br>+30% more (total +60%)<br>🍷 → 🍾<br>Requires 100,000 total`;
            rebirthBtn.disabled = !(totalAllTime >= 100000);
            reqDiv.innerText = totalAllTime>=100000 ? "✅ READY" : `Need ${100000-totalAllTime} more`;
        } else if(rebirthLevel === 2) {
            rebirthDesc.innerHTML = `<strong>🌀 3rd REBIRTH: STELLAR COLA</strong><br>+30% more (total +90%)<br>🍾 → 🏆<br>Requires 1,000,000 total`;
            rebirthBtn.disabled = !(totalAllTime >= 1000000);
            reqDiv.innerText = totalAllTime>=1000000 ? "✅ READY" : `Need ${1000000-totalAllTime} more`;
        } else {
            rebirthDesc.innerHTML = `<strong>✨ COSMIC LEGEND</strong><br>Max rebirth! +90% bonus<br>You've reached ultimate cola form.`;
            rebirthBtn.disabled = true;
            rebirthBtn.innerText = "🌟 MAXED";
        }
        document.getElementById("colaMain").innerText = getColaIcon();
        document.title = `${getColaName()} · ${Math.floor(cola)} cola`;
        saveToLeaderboard();
    }
    
    function floatingText(msg, x, y) {
        let el = document.createElement("div");
        el.className = "float-text";
        el.innerText = msg;
        let cx = x || (window.innerWidth/2 + (Math.random()*100-50));
        let cy = y || (window.innerHeight/2 - 50);
        el.style.left = cx + "px";
        el.style.top = cy + "px";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1100);
    }
    
    // CLICK HANDLER with smooth animations
    function handleColaClick(e) {
        if(locked) { showToast("⛔ Click locked by anti-cheat"); return; }
        if(!antiClickCheck()) return;
        let gain = getClickGain();
        if(gain < 1) gain = 1;
        cola += gain;
        totalAllTime += gain;
        updateStreak();
        restartIdleTimer();
        playSFX();
        
        let colaDiv = document.getElementById("colaMain");
        colaDiv.classList.add("cola-click-anim");
        setTimeout(() => colaDiv.classList.remove("cola-click-anim"), 120);
        let rect = colaDiv.getBoundingClientRect();
        floatingText(`+${gain}`, rect.left + rect.width/2, rect.top + rect.height/3);
        updateUI();
    }
    
    // AUTO LOOP
    setInterval(() => {
        let inc = getAutoIncome();
        if(inc > 0 && !locked) {
            cola += inc;
            totalAllTime += inc;
            updateUI();
        }
    }, 1000);
    
    // UPGRADES
    function buyClickUpgrade() { if(cola>=clickCostBase) { cola-=clickCostBase; clickPower++; clickUpgradeLvl++; clickCostBase = Math.floor(10 + clickPower*5); playUpgradeSound(); updateUI(); } else floatingText("❌ Not enough",0,0); }
    function buyQuantum() { if(!quantum && cola>=quantumCost) { cola-=quantumCost; quantum=true; playUpgradeSound(); updateUI(); } else floatingText("❌",0,0); }
    function buyAuto() { if(cola>=autoCost) { cola-=autoCost; autoCount++; autoCost = Math.floor(30 + autoCount*11); playUpgradeSound(); updateUI(); } else floatingText("❌",0,0); }
    function buyFactory() { if(cola>=factoryCost) { cola-=factoryCost; factoryCount++; factoryCost = Math.floor(220 + factoryCount*34); playUpgradeSound(); updateUI(); } else floatingText("❌",0,0); }
    function buyMega() { if(cola>=megaCost) { cola-=megaCost; megaCount++; megaCost = Math.floor(1200 + megaCount*170); playUpgradeSound(); updateUI(); } else floatingText("❌",0,0); }
    
    function buyRelic(tier) {
        if(relics[tier]) return;
        let cost = relicCosts[tier];
        if(cola >= cost) {
            cola -= cost;
            relics[tier] = true;
            playUpgradeSound();
            floatingText(`✨ ${tier===1?"Galaxy":tier===2?"Nebula":"Stellar"} Relic acquired!`,0,0);
            updateUI();
        } else floatingText(`❌ Need ${cost} cola`,0,0);
    }
    
    function performRebirth() {
        let can = false;
        let newTier = 0;
        if(rebirthLevel === 0 && totalAllTime >= 10000) { can = true; newTier = 1; }
        else if(rebirthLevel === 1 && totalAllTime >= 100000) { can = true; newTier = 2; }
        else if(rebirthLevel === 2 && totalAllTime >= 1000000) { can = true; newTier = 3; }
        if(!can) { floatingText("❌ Rebirth locked",0,0); return; }
        if(!confirm(`🌀 REBIRTH to ${newTier===1?"GALAXY COLA":newTier===2?"NEBULA COLA":"STELLAR COLA"}?\n+30% permanent bonus, reset all upgrades & cola.\nCola icon will EVOLVE!`)) return;
        
        // reset progress
        cola = 0;
        clickPower = 1;
        quantum = false;
        autoCount = 0; factoryCount = 0; megaCount = 0;
        clickUpgradeLvl = 0;
        clickCostBase = 10;
        quantumCost = 450;
        autoCost = 30; factoryCost = 220; megaCost = 1200;
        streak = 0; streakMulti = 1.0;
        
        permBonus += 30;
        rebirthLevel = newTier;
        
        let colaIconDiv = document.getElementById("colaMain");
        colaIconDiv.classList.add("rebirth-ascend");
        setTimeout(() => colaIconDiv.classList.remove("rebirth-ascend"), 700);
        playUpgradeSound();
        updateUI();
        closeAllPanels();
        floatingText(`🌀 REBIRTH ${newTier}! +30% permanent bonus`, window.innerWidth/2, 150);
        restartIdleTimer();
    }
    
    // Panel & Audio
    function openPanel(id) { closeAllPanels(); document.getElementById(id).style.display = "flex"; }
    function closeAllPanels() { document.querySelectorAll('.panel').forEach(p => p.style.display = "none"); }
    function toggleMusic() { musicOn = !musicOn; musicOn ? music.play().catch(e=>{}) : music.pause(); }
    function toggleSFX() { sfxOn = !sfxOn; }
    function setVolume(v) { volume = v; music.volume = volume; }
    
    document.getElementById("colaMain").addEventListener("click", handleColaClick);
    document.getElementById("volSlider").addEventListener("input", e => setVolume(parseFloat(e.target.value)));
    
    // init leaderboard
    let storedBoard = localStorage.getItem("colaLeaderboard");
    if(storedBoard) leaderboard = JSON.parse(storedBoard);
    playerName = localStorage.getItem("colaPlayer");
    if(!playerName) { playerName = prompt("Enter your name:", "ColaMaster") || "Guest"; playerName = playerName.slice(0,14); localStorage.setItem("colaPlayer", playerName); }
    renderLeaderboard();
    restartIdleTimer();
    updateUI();
</script>
</body>
</html>
