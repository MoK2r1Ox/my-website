<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* TOP MENU */
#topbar {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  cursor: pointer;
  background: #333;
  color: white;
  border: none;
  border-radius: 6px;
}

/* CENTER GAME */
#game {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#colaBtn {
  font-size: 120px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
}

#colaBtn:active {
  transform: scale(0.9);
}

/* FLOAT TEXT */
.float {
  position: absolute;
  color: #00ff88;
  font-size: 20px;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-100px); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 60px;
  left: 10px;
  width: 220px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggle('shop')">Upgrades</button>
  <button onclick="toggle('settings')">Settings</button>
</div>

<div id="shop" class="panel">
  <h3>Upgrades</h3>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyAuto()">Auto Cola (25)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>
  <p>All-time cola: <span id="allTime">0</span></p>
</div>

<div id="game">
  <div id="colaBtn">🥤</div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;

const btn = document.getElementById("colaBtn");

btn.onclick = (e) => {
  let gain = clickPower;

  // 🔥 20% bonus chance
  if (Math.random() < 0.2) {
    gain += 1;
  }

  cola += gain;
  allTime += gain;

  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + gain;
  f.style.left = e.pageX + "px";
  f.style.top = e.pageY + "px";
  document.body.appendChild(f);

  setTimeout(() => f.remove(), 1000);

  update();
};

function buyClick(){
  if(cola >= 10){
    cola -= 10;
    clickPower++;
    update();
  }
}

function buyAuto(){
  if(cola >= 25){
    cola -= 25;
    auto++;
    update();
  }
}

function update(){
  document.getElementById("allTime").innerText = allTime;
}

/* AUTO COLA */
setInterval(()=>{
  cola += auto;
  allTime += auto;
  update();
},1000);

/* FIXED MENU SYSTEM */
function toggle(id){
  let panels = ["shop","settings"];

  panels.forEach(p=>{
    let el = document.getElementById(p);
    if(el) el.style.display = "none";
  });

  let target = document.getElementById(id);
  if(target){
    target.style.display = "block";
  }
}
</script>

</body>
</html>
