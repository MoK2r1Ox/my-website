<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker Deluxe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* BIG COLA DISPLAY */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
}

#bigCola {
  font-size: 60px;
  font-weight: bold;
  text-align: center;
  margin-top: 20px;
}

/* TOP MENU */
#top {
  position: absolute;
  top: 70px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

/* CENTER */
#main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#cola {
  font-size: 170px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
}

#cola:active {
  transform: scale(0.9);
}

/* FLOAT */
.float {
  position: fixed;
  color: #00ff88;
  font-size: 22px;
  font-weight: bold;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-120px); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 120px;
  left: 10px;
  width: 280px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* STREAK HUD (BACK + CLEAR) */
#streakHUD {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 260px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

#bar {
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  margin-top: 5px;
}

#fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ff88, #00aaff);
  transition: width 0.1s;
}
</style>
</head>

<body>

<div id="hud">
  🥤 Cola: <span id="colaCount">0</span>
</div>

<div id="bigCola">
  TOTAL: <span id="allTime">0</span>
</div>

<div id="top">
  <button onclick="openTab('shop')">Upgrades</button>
  <button onclick="openTab('settings')">Settings</button>
  <button onclick="openTab('leader')">Leaderboard</button>
</div>

<div id="shop" class="panel">
  <h3>Upgrades</h3>

  <p>⚡ CLICK UPGRADES</p>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyGalaxy()">Galaxy Cola +100 Click (500)</button>

  <hr>

  <p>🤖 AUTO UPGRADES</p>
  <button onclick="buyAuto()">Auto Cola (25)</button>
  <button onclick="buyFactory()">Coke Factory +30/s (200)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>
  <p>Prestige: <span id="prestige">0</span></p>
</div>

<div id="leader" class="panel">
  <h3>Leaderboard</h3>
  <div id="board"></div>
</div>

<div id="main">
  <div id="cola">🥤</div>
</div>

<!-- STREAK -->
<div id="streakHUD">
  <div>STREAK: <span id="multi">1.00x</span> (100 clicks max)</div>
  <div id="bar"><div id="fill"></div></div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;
let prestige = 0;
let boost = 1;

/* STREAK SYSTEM */
let streak = 0;
let lastClick = 0;

/* CLICK */
document.getElementById("cola").onclick = (e) => {
  let now = Date.now();

  if(now - lastClick < 600) streak++;
  else streak = 1;

  lastClick = now;

  // 🔥 100 CLICK GRIND SYSTEM → MAX x2.0
  let mult = 1 + Math.min(streak / 100, 1);

  let gain = clickPower * mult * boost;

  cola += gain;
  allTime += gain;

  float(e, gain);

  updateStreak(mult);
  update();
};

/* FLOAT */
function float(e,val){
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + val.toFixed(1);

  f.style.left = e.clientX + "px";
  f.style.top = e.clientY + "px";

  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* STREAK UI */
function updateStreak(mult){
  document.getElementById("multi").innerText = mult.toFixed(2) + "x";

  let percent = Math.min((streak / 100) * 100, 100);
  document.getElementById("fill").style.width = percent + "%";
}

/* UPGRADES */
function buyClick(){ if(cola>=10){ cola-=10; clickPower++; update(); } }
function buyGalaxy(){ if(cola>=500){ cola-=500; clickPower+=100; update(); } }

function buyAuto(){ if(cola>=25){ cola-=25; auto++; update(); } }
function buyFactory(){ if(cola>=200){ cola-=200; auto+=30; update(); } }

/* AUTO */
setInterval(()=>{
  cola += auto * boost;
  allTime += auto * boost;
  update();
},1000);

/* PANELS */
function openTab(id){
  ["shop","settings","leader"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* LEADERBOARD */
function updateBoard(){
  let fake = [
    ["You", allTime],
    ["Player2", 5000],
    ["Player3", 3000]
  ];

  fake.sort((a,b)=>b[1]-a[1]);

  document.getElementById("board").innerHTML =
    fake.map(p=>`<p>${p[0]} - ${p[1].toFixed(0)}</p>`).join("");
}

/* UPDATE */
function update(){
  document.getElementById("colaCount").innerText = Math.floor(cola);
  document.getElementById("allTime").innerText = Math.floor(allTime);
  document.getElementById("prestige").innerText = prestige;
  updateBoard();
}
</script>

</body>
</html>
