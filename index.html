<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;

const btn = document.getElementById("colaBtn");

btn.onclick = (e) => {
  let gain = clickPower;

  // 🔥 RANDOM BONUS (20% chance extra +1)
  if (Math.random() < 0.2) {
    gain += 1;
  }

  cola += gain;
  allTime += gain;

  // floating text
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+" + gain;
  f.style.left = e.pageX + "px";
  f.style.top = e.pageY + "px";
  document.body.appendChild(f);

  setTimeout(() => f.remove(), 1000);

  update();
};

function buyClick(){
  if(cola >= 10){
    cola -= 10;
    clickPower++;
    update();
  }
}

function buyAuto(){
  if(cola >= 25){
    cola -= 25;
    auto++;
    update();
  }
}

function update(){
  document.getElementById("allTime").innerText = allTime;
}

/* 🔥 AUTO SYSTEM */
setInterval(()=>{
  cola += auto;
  allTime += auto;
  update();
},1000);

/* 🔥 FIXED MENU SYSTEM (ONLY ONE OPEN) */
function toggle(id){
  let panels = ["shop","settings"];

  panels.forEach(p=>{
    let el = document.getElementById(p);
    if(el) el.style.display = "none";
  });

  let target = document.getElementById(id);
  if(target){
    target.style.display = "block";
  }
}
</script>
