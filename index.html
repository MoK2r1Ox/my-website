<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥤 Cola Prestige | Unlock New Upgrades</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            background: radial-gradient(circle at 30% 20%, #2c1a0c, #0f0702);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.4s ease;
        }

        /* Prestige background themes */
        body.prestige-0 { background: radial-gradient(circle at 30% 20%, #3e1a0a, #1a0a02); }
        body.prestige-1 { background: radial-gradient(circle at 70% 40%, #5e2a18, #200d03); box-shadow: inset 0 0 80px rgba(200,80,30,0.2); }
        body.prestige-2 { background: radial-gradient(circle at 20% 80%, #1a3f2c, #0a1f12); box-shadow: inset 0 0 100px rgba(0,255,200,0.1); }
        body.prestige-3 { background: radial-gradient(circle at 50% 50%, #4a2c1a, #221105); box-shadow: inset 0 0 120px rgba(255,215,0,0.25); }

        /* HUD */
        #hud {
            position: fixed;
            top: 15px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            z-index: 100;
            border-left: 4px solid #ff7e3a;
            font-family: monospace;
        }
        #totalDisplay {
            position: fixed;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            border-right: 4px solid #ffaa44;
        }
        #streakBox {
            position: fixed;
            top: 85px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #ffdd99;
            border-left: 3px solid #ffaa33;
            font-family: monospace;
            z-index: 100;
        }
        #streakPercent { font-size: 1.2rem; color: #ffcc55; font-weight: bold; }
        #prestigeBadge {
            position: fixed;
            top: 85px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #e6c8ff;
            border-right: 3px solid #c084fc;
            z-index: 100;
        }
        .menu-bar {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            z-index: 200;
        }
        .menu-btn {
            background: #2c2118dd;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa6644;
            padding: 10px 26px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #f5e2c1;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
        }
        .menu-btn:active { transform: scale(0.96); }
        #colaCenter {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        #cola {
            font-size: 210px;
            cursor: pointer;
            filter: drop-shadow(0 0 25px rgba(255,100,30,0.8));
            transition: transform 0.07s cubic-bezier(0.2, 1.2, 0.8, 1);
        }
        #cola:active { transform: scale(0.92); }
        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            max-width: 88vw;
            background: #1e1712ea;
            backdrop-filter: blur(20px);
            border-radius: 38px;
            padding: 20px 18px;
            border: 1px solid #ffaa6680;
            box-shadow: 0 25px 40px black;
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 10px;
            color: #fff0e0;
        }
        .panel h3 { margin: 0 0 8px; text-align: center; color: #ffcf9a; }
        .panel button {
            background: #3e2a1f;
            border: none;
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.07s linear;
        }
        .panel button:active { transform: scale(0.97); background: #5e3e2a; }
        .close-panel { background: #7a3a28 !important; margin-top: 8px; }
        hr { border-color: #ffb34760; margin: 8px 0; }
        .prestige-card {
            background: #2a1f1ad9;
            border-left: 5px solid #ffb347;
            padding: 12px 12px;
            border-radius: 28px;
            margin: 8px 0;
        }
        .prestige-highlight {
            color: #ffcc88;
            font-weight: bold;
        }
        .float {
            position: fixed;
            font-weight: bold;
            color: #fff0aa;
            text-shadow: 0 0 8px #ff8800;
            animation: floatPop 1s forwards;
            pointer-events: none;
            font-size: 1.5rem;
            z-index: 1000;
        }
        @keyframes floatPop {
            0% { opacity: 1; transform: translateY(0) scale(0.8);}
            100% { opacity: 0; transform: translateY(-130px) scale(1.5);}
        }
        .streak-flash {
            animation: pulseGold 0.2s ease-out;
        }
        @keyframes pulseGold {
            0% { text-shadow: 0 0 0px gold; background: rgba(255,200,0,0);}
            100% { text-shadow: 0 0 18px #ffcc44; background: rgba(255,200,0,0.2);}
        }
        .click-effect {
            animation: colaPop 0.1s ease-out;
        }
        @keyframes colaPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .locked-notice {
            font-size: 0.8rem;
            color: #ffaa88;
            text-align: center;
        }
    </style>
</head>
<body class="prestige-0">

<div id="hud">🥤 COLA: <span id="colaCount">0</span></div>
<div id="totalDisplay">📈 TOTAL: <span id="allTime">0</span></div>
<div id="streakBox">
    🔥 STREAK: <span id="streakValue">0</span> / 100 &nbsp;| 
    ✨ BONUS: +<span id="streakPercent">0</span>%
</div>
<div id="prestigeBadge">🏆 PRESTIGE <span id="prestigeLevel">0</span> &nbsp;| 💪 BONUS +<span id="prestigeBonus">0</span>%</div>

<div class="menu-bar">
    <button class="menu-btn" onclick="openPanel('shopPanel')">🏪 UPGRADES</button>
    <button class="menu-btn" onclick="openPanel('prestigePanel')">🌟 PRESTIGE</button>
    <button class="menu-btn" onclick="openPanel('settingsPanel')">⚙️ SETTINGS</button>
</div>

<!-- UPGRADES PANEL - Shows new upgrades after prestige -->
<div id="shopPanel" class="panel">
    <h3>🍫 CLICKER UPGRADES</h3>
    <button onclick="buyClickPower()">🔨 +1 Base Click (Cost: <span id="clickCost">10</span>)</button>
    <button onclick="buyQuantum()">⚛️ Quantum Core +50 (Cost: <span id="quantumCost">450</span>)</button>
    <hr>
    <h3>🏭 AUTO PRODUCERS</h3>
    <button onclick="buySiphon()">🥤 Auto Siphon +1/sec (Cost: <span id="autoCost">30</span>)</button>
    <button onclick="buyBottler()">🏭 Bottling Plant +8/sec (Cost: <span id="factoryCost">220</span>)</button>
    <button onclick="buyMegaTank()">🌀 Mega Tank +50/sec (Cost: <span id="megaCost">1200</span>)</button>
    
    <!-- PRESTIGE EXCLUSIVE UPGRADES (appear only after unlocking each tier) -->
    <hr id="prestigeUpgradeDivider" style="display: none;">
    <div id="prestigeUpgradesContainer">
        <h3 id="prestigeUpgradeTitle" style="display: none;">✨ PRESTIGE LEGACY UPGRADES</h3>
        <button id="prestigeUpgrade1" style="display: none; background: #5e3a2a;" onclick="buyPrestigeUpgrade(1)">🌟 Tier1 Relic: +15% Global (Cost: <span id="prestigeUpgrade1Cost">800</span>)</button>
        <button id="prestigeUpgrade2" style="display: none; background: #6a4e3a;" onclick="buyPrestigeUpgrade(2)">💎 Tier2 Relic: +25% Global (Cost: <span id="prestigeUpgrade2Cost">5000</span>)</button>
        <button id="prestigeUpgrade3" style="display: none; background: #8a6a3a;" onclick="buyPrestigeUpgrade(3)">👑 Tier3 Relic: +50% Global (Cost: <span id="prestigeUpgrade3Cost">25000</span>)</button>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">✖ CLOSE</button>
</div>

<!-- PRESTIGE PANEL: Show only the next available prestige with clear description -->
<div id="prestigePanel" class="panel">
    <h3>🌟 PRESTIGE - UNLOCK NEW POWER</h3>
    <div id="prestigeInfo" class="prestige-card">
        <div id="prestigeDescription"></div>
        <button id="prestigeActionBtn" onclick="performPrestige()" style="margin-top: 12px; background: #c97e3a;">✨ PRESTIGE NOW</button>
        <div id="prestigeWarning" class="locked-notice" style="margin-top: 8px;"></div>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel">
    <h3>🎧 AUDIO & THEME</h3>
    <button onclick="toggleMusic()">🎵 Toggle Music</button>
    <button onclick="toggleSFX()">🔊 Toggle SFX</button>
    <p>🔊 Master Volume</p>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.3">
    <hr>
    <p><em>Streak = +1% per click, max 100% at 100 clicks!</em></p>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<div id="colaCenter">
    <div id="cola">🥤</div>
</div>

<script>
    // ------------------- GAME STATE -------------------
    let cola = 0;
    let totalAllTime = 0;
    let baseClickPower = 1;
    let quantumActive = false;
    let autoSiphonCount = 0;
    let bottlerCount = 0;
    let megaTankCount = 0;
    
    // Prestige system: tier 0,1,2,3
    let prestigeTier = 0;
    let globalBonusPercent = 0;     // cumulative % from prestige (30% per tier)
    
    // Prestige-exclusive upgrades (each unlockable only after reaching that prestige tier)
    let prestigeUpgradeBought = [false, false, false]; // index 1,2,3
    let prestigeUpgradeCost = [0, 800, 5000, 25000];
    
    // Streak system
    let currentStreak = 0;
    let streakBonusPercent = 0;
    let streakSaverOwned = false;
    
    // Upgrade costs
    let clickUpgradeLevel = 0;
    let clickCost = 10;
    let quantumCost = 450;
    let siphonCost = 30;
    let bottlerCost = 220;
    let megaCost = 1200;
    
    // Audio
    let musicOn = true;
    let sfxOn = true;
    let volume = 0.3;
    let music = new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12b5f1b8a1.mp3");
    music.loop = true;
    music.volume = volume;
    
    function playClickSound() {
        if(!sfxOn) return;
        let snd = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c1b6d4b4d4.mp3");
        snd.volume = volume;
        snd.play().catch(e=>{});
    }
    function playUpgradeSound() {
        if(!sfxOn) return;
        let snd = new Audio("https://cdn.pixabay.com/audio/2022/05/16/audio_8b6a7c8f2c.mp3");
        snd.volume = volume;
        snd.play().catch(e=>{});
    }
    music.play().catch(()=>console.log("click to enable music"));
    
    // Helper: total global multiplier = 1 + (globalBonusPercent/100) + prestigeUpgrade bonuses
    function getTotalGlobalMultiplier() {
        let bonus = globalBonusPercent;
        if(prestigeUpgradeBought[1]) bonus += 15;
        if(prestigeUpgradeBought[2]) bonus += 25;
        if(prestigeUpgradeBought[3]) bonus += 50;
        return 1 + (bonus / 100);
    }
    
    function getFinalClickPower() {
        let base = baseClickPower;
        if(quantumActive) base += 50;
        let streakMulti = 1 + (streakBonusPercent / 100);
        let total = Math.floor(base * streakMulti * getTotalGlobalMultiplier());
        return total < 1 ? 1 : total;
    }
    
    function getAutoIncome() {
        let auto = autoSiphonCount + (bottlerCount * 8) + (megaTankCount * 50);
        auto = Math.floor(auto * getTotalGlobalMultiplier());
        return auto;
    }
    
    // Streak logic: each click = +1% up to 100%
    function updateStreakOnClick() {
        if(currentStreak < 100) {
            currentStreak++;
            streakBonusPercent = currentStreak;
            if(streakBonusPercent > 100) streakBonusPercent = 100;
        } else {
            streakBonusPercent = 100;
        }
        let sb = document.getElementById("streakBox");
        sb.classList.add("streak-flash");
        setTimeout(()=> sb.classList.remove("streak-flash"), 200);
    }
    
    let idleTimeout;
    function resetStreakFromIdle() {
        if(currentStreak > 0) {
            if(streakSaverOwned) {
                let preserved = Math.floor(currentStreak * 0.4);
                currentStreak = preserved;
                streakBonusPercent = currentStreak;
                showFloatingText(`🛡️ Streak Saver! Streak → ${currentStreak}%`, window.innerWidth/2, 80);
            } else {
                currentStreak = 0;
                streakBonusPercent = 0;
                showFloatingText(`💔 Streak broken!`, window.innerWidth/2, 80);
            }
            updateUI();
        }
    }
    function resetIdleTimer() {
        if(idleTimeout) clearTimeout(idleTimeout);
        idleTimeout = setTimeout(() => resetStreakFromIdle(), 5200);
    }
    
    // UI update with prestige visibility rules
    function updateUI() {
        document.getElementById("colaCount").innerText = Math.floor(cola);
        document.getElementById("allTime").innerText = Math.floor(totalAllTime);
        document.getElementById("streakValue").innerText = currentStreak;
        document.getElementById("streakPercent").innerText = streakBonusPercent;
        document.getElementById("prestigeLevel").innerText = prestigeTier;
        document.getElementById("prestigeBonus").innerText = globalBonusPercent;
        
        document.getElementById("clickCost").innerText = clickCost;
        document.getElementById("quantumCost").innerText = quantumCost;
        document.getElementById("autoCost").innerText = siphonCost;
        document.getElementById("factoryCost").innerText = bottlerCost;
        document.getElementById("megaCost").innerText = megaCost;
        
        // Show prestige upgrades based on tier reached
        let divider = document.getElementById("prestigeUpgradeDivider");
        let title = document.getElementById("prestigeUpgradeTitle");
        let btn1 = document.getElementById("prestigeUpgrade1");
        let btn2 = document.getElementById("prestigeUpgrade2");
        let btn3 = document.getElementById("prestigeUpgrade3");
        
        if(prestigeTier >= 1) {
            divider.style.display = "block";
            title.style.display = "block";
            btn1.style.display = "block";
            if(prestigeUpgradeBought[1]) btn1.disabled = true;
            else btn1.disabled = false;
            document.getElementById("prestigeUpgrade1Cost").innerText = prestigeUpgradeCost[1];
        } else {
            btn1.style.display = "none";
        }
        if(prestigeTier >= 2) {
            btn2.style.display = "block";
            if(prestigeUpgradeBought[2]) btn2.disabled = true;
            else btn2.disabled = false;
            document.getElementById("prestigeUpgrade2Cost").innerText = prestigeUpgradeCost[2];
        } else {
            btn2.style.display = "none";
        }
        if(prestigeTier >= 3) {
            btn3.style.display = "block";
            if(prestigeUpgradeBought[3]) btn3.disabled = true;
            else btn3.disabled = false;
            document.getElementById("prestigeUpgrade3Cost").innerText = prestigeUpgradeCost[3];
        } else {
            btn3.style.display = "none";
        }
        
        // Prestige panel dynamic description (only show current available prestige)
        updatePrestigePanelDescription();
        
        // Background theme based on tier
        let bodyClass = document.body;
        bodyClass.classList.remove("prestige-0", "prestige-1", "prestige-2", "prestige-3");
        if(prestigeTier === 0) bodyClass.classList.add("prestige-0");
        else if(prestigeTier === 1) bodyClass.classList.add("prestige-1");
        else if(prestigeTier === 2) bodyClass.classList.add("prestige-2");
        else if(prestigeTier === 3) bodyClass.classList.add("prestige-3");
        
        // Cola emoji evolution
        let colaEmoji = document.getElementById("cola");
        if(prestigeTier === 0) colaEmoji.innerText = "🥤";
        else if(prestigeTier === 1) colaEmoji.innerText = "🍒";
        else if(prestigeTier === 2) colaEmoji.innerText = "💎";
        else if(prestigeTier === 3) colaEmoji.innerText = "👑";
    }
    
    // Show only the next prestige (you see Prestige 1 until you do it, then Prestige 2 appears, etc.)
    function updatePrestigePanelDescription() {
        let descDiv = document.getElementById("prestigeDescription");
        let actionBtn = document.getElementById("prestigeActionBtn");
        let warningDiv = document.getElementById("prestigeWarning");
        
        if(prestigeTier === 0) {
            descDiv.innerHTML = `<span class="prestige-highlight">🥤 PRESTIGE 1 (Cherry Cola)</span><br>
            ➤ You will get <strong>+30% permanent cola bonus</strong> forever!<br>
            ➤ Unlock <strong>3 new powerful upgrades</strong> in the shop!<br>
            ➤ Cola evolves into 🍒<br>
            ➤ Requirement: 10,000 total cola<br>
            <span style="color:#ffaa66;">⚠️ You will lose ALL upgrades and cola, but keep total cola count!</span>`;
            if(totalAllTime >= 10000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ Ready to Prestige! You'll gain +30% permanent bonus.";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${10000 - totalAllTime} more total cola to unlock Prestige 1.`;
            }
        } 
        else if(prestigeTier === 1) {
            descDiv.innerHTML = `<span class="prestige-highlight">💎 PRESTIGE 2 (Diamond Cola)</span><br>
            ➤ You will get <strong>+30% permanent cola bonus</strong> (stacking, total +60%)!<br>
            ➤ Unlock <strong>3 more new upgrades</strong> (Tier 2 relics)!<br>
            ➤ Cola evolves into 💎<br>
            ➤ Requirement: 100,000 total cola<br>
            <span style="color:#ffaa66;">⚠️ You will lose ALL upgrades and cola again, but keep total cola count!</span>`;
            if(totalAllTime >= 100000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ Ready for Prestige 2! +30% more bonus (total +60%)";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${100000 - totalAllTime} more total cola for Prestige 2.`;
            }
        }
        else if(prestigeTier === 2) {
            descDiv.innerHTML = `<span class="prestige-highlight">👑 PRESTIGE 3 (Golden Cola)</span><br>
            ➤ You will get <strong>+30% permanent cola bonus</strong> (total +90%)!<br>
            ➤ Unlock <strong>3 final ultimate upgrades</strong> (Tier 3 relics)!<br>
            ➤ Cola evolves into 👑<br>
            ➤ Requirement: 1,000,000 total cola<br>
            <span style="color:#ffaa66;">⚠️ Final Prestige! Massive power!</span>`;
            if(totalAllTime >= 1000000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ ULTIMATE PRESTIGE READY! +30% final bonus.";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${1000000 - totalAllTime} more total cola for Prestige 3.`;
            }
        }
        else {
            descDiv.innerHTML = `<span class="prestige-highlight">🌟 MAX PRESTIGE ACHIEVED!</span><br>
            You have reached the highest Prestige tier!<br>
            Keep stacking upgrades and enjoy your +90% permanent bonus!<br>
            👑 Golden Cola Master!`;
            actionBtn.disabled = true;
            actionBtn.innerText = "✨ MAXED";
            warningDiv.innerText = "You are a Cola Legend!";
        }
    }
    
    // Perform Prestige (only current tier)
    function performPrestige() {
        let canPrestige = false;
        let newTier = 0;
        if(prestigeTier === 0 && totalAllTime >= 10000) { canPrestige = true; newTier = 1; }
        else if(prestigeTier === 1 && totalAllTime >= 100000) { canPrestige = true; newTier = 2; }
        else if(prestigeTier === 2 && totalAllTime >= 1000000) { canPrestige = true; newTier = 3; }
        
        if(!canPrestige) {
            showFloatingText("❌ Prestige requirements not met!", window.innerWidth/2, 120);
            return;
        }
        
        let confirmMsg = `✨ PRESTIGE TO TIER ${newTier}?\n\nYou will gain +30% permanent bonus (total +${(globalBonusPercent+30)}%).\nYou will lose all cola, click upgrades, auto producers, and streak upgrades.\nBut you will unlock new powerful legacy upgrades!\n\nProceed?`;
        if(!confirm(confirmMsg)) return;
        
        // Reset all progress
        cola = 0;
        baseClickPower = 1;
        clickUpgradeLevel = 0;
        quantumActive = false;
        autoSiphonCount = 0;
        bottlerCount = 0;
        megaTankCount = 0;
        clickCost = 10;
        quantumCost = 450;
        siphonCost = 30;
        bottlerCost = 220;
        megaCost = 1200;
        streakSaverOwned = false;
        currentStreak = 0;
        streakBonusPercent = 0;
        
        // Increase global bonus by 30%
        globalBonusPercent += 30;
        prestigeTier = newTier;
        
        playUpgradeSound();
        updateUI();
        closeAllPanels();
        showFloatingText(`🌟 PRESTIGE ${newTier} ACHIEVED! +30% PERMANENT BONUS!`, window.innerWidth/2, 100);
        resetIdleTimer();
    }
    
    // Buy prestige-exclusive upgrades (appear only after unlocking tier)
    function buyPrestigeUpgrade(tier) {
        if(prestigeUpgradeBought[tier]) {
            showFloatingText("Already bought this relic!",0,0);
            return;
        }
        let cost = prestigeUpgradeCost[tier];
        if(cola >= cost) {
            cola -= cost;
            prestigeUpgradeBought[tier] = true;
            playUpgradeSound();
            showFloatingText(`✨ ${tier==1?"Tier1":tier==2?"Tier2":"Tier3"} Relic acquired! +${tier==1?15:tier==2?25:50}% global bonus!`,0,0);
            updateUI();
        } else {
            showFloatingText(`❌ Need ${cost} cola for this relic!`,0,0);
        }
    }
    
    // Standard upgrades
    function buyClickPower() {
        if(cola >= clickCost) {
            cola -= clickCost;
            baseClickPower++;
            clickUpgradeLevel++;
            clickCost = Math.floor(10 + baseClickPower * 5);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Not enough cola!",0,0);
    }
    function buyQuantum() {
        if(!quantumActive && cola >= quantumCost) {
            cola -= quantumCost;
            quantumActive = true;
            playUpgradeSound();
            updateUI();
        } else if(quantumActive) showFloatingText("⚛️ Already owned!",0,0);
        else showFloatingText("❌ Need cola",0,0);
    }
    function buySiphon() {
        if(cola >= siphonCost) {
            cola -= siphonCost;
            autoSiphonCount++;
            siphonCost = Math.floor(30 + autoSiphonCount * 10);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    function buyBottler() {
        if(cola >= bottlerCost) {
            cola -= bottlerCost;
            bottlerCount++;
            bottlerCost = Math.floor(220 + bottlerCount * 32);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    function buyMegaTank() {
        if(cola >= megaCost) {
            cola -= megaCost;
            megaTankCount++;
            megaCost = Math.floor(1200 + megaTankCount * 160);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    function buyStreakSaver() {
        if(!streakSaverOwned && cola >= 500) {
            cola -= 500;
            streakSaverOwned = true;
            playUpgradeSound();
            showFloatingText("🛡️ Streak Saver ACTIVE!",0,0);
            updateUI();
        } else if(streakSaverOwned) showFloatingText("Already owned!",0,0);
        else showFloatingText("Need 500 cola",0,0);
    }
    
    function showFloatingText(msg, x, y) {
        let f = document.createElement("div");
        f.className = "float";
        f.innerText = msg;
        let posX = x || (window.innerWidth/2 + (Math.random() * 100 - 50));
        let posY = y || (window.innerHeight/2 - 60 + (Math.random() * 90));
        f.style.left = posX + "px";
        f.style.top = posY + "px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(), 1000);
    }
    
    function onColaClick(e) {
        let gain = getFinalClickPower();
        cola += gain;
        totalAllTime += gain;
        updateStreakOnClick();
        resetIdleTimer();
        playClickSound();
        let colaDiv = document.getElementById("cola");
        colaDiv.classList.add("click-effect");
        setTimeout(()=> colaDiv.classList.remove("click-effect"), 100);
        let rect = colaDiv.getBoundingClientRect();
        showFloatingText(`+${gain} (${streakBonusPercent}% streak)`, rect.left+rect.width/2, rect.top+rect.height/2-25);
        updateUI();
    }
    
    setInterval(() => {
        let income = getAutoIncome();
        if(income > 0) {
            cola += income;
            totalAllTime += income;
            updateUI();
        }
    }, 1000);
    
    function openPanel(id) {
        closeAllPanels();
        let panel = document.getElementById(id);
        if(panel) panel.style.display = "flex";
    }
    function closeAllPanels() {
        document.querySelectorAll('.panel').forEach(p => p.style.display = "none");
    }
    function toggleMusic() {
        musicOn = !musicOn;
        if(musicOn) music.play().catch(e=>{});
        else music.pause();
    }
    function toggleSFX() { sfxOn = !sfxOn; }
    function setVolume(v) {
        volume = v;
        music.volume = volume;
    }
    
    document.getElementById("cola").addEventListener("click", onColaClick);
    document.getElementById("volumeSlider").addEventListener("input", (e) => setVolume(parseFloat(e.target.value)));
    document.body.addEventListener("click", (e) => {
        if(!e.target.closest('#cola')) resetIdleTimer();
    });
    
    resetIdleTimer();
    updateUI();
</script>
</body>
</html>
