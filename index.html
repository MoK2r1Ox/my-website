<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cola Clicker Deluxe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  overflow: hidden;
}

/* TOP */
#top {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

/* CENTER */
#main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#cola {
  font-size: 140px;
  cursor: pointer;
  user-select: none;
}

/* FLOAT */
.float {
  position: fixed;
  color: #00ff88;
  font-size: 20px;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-100px); }
}

/* PANELS */
.panel {
  position: absolute;
  top: 60px;
  left: 10px;
  width: 260px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* PRESTIGE MODAL */
#prestigeModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

#prestigeBox {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

.green { color: #00ff88; }
.red { color: #ff4444; }
</style>
</head>

<body>

<div id="top">
  <button onclick="openTab('shop')">Upgrades</button>
  <button onclick="openTab('settings')">Settings</button>
  <button onclick="openTab('leader')">Leaderboard</button>
  <button onclick="openPrestige()">Prestige ⭐</button>
</div>

<div id="shop" class="panel">
  <h3>Upgrades</h3>
  <button onclick="buyClick()">+1 Click (10)</button>
  <button onclick="buyAuto()">Auto Cola (25)</button>
  <button onclick="buyFactory()">Coke Factory (200)</button>
  <button onclick="buyGalaxy()">Galaxy Cola (500)</button>
</div>

<div id="settings" class="panel">
  <h3>Settings</h3>
  <p>All-time cola: <span id="allTime">0</span></p>
  <p>Prestige: <span id="prestige">0</span></p>
</div>

<div id="leader" class="panel">
  <h3>Leaderboard</h3>
  <div id="board"></div>
</div>

<div id="main">
  <div id="cola">🥤</div>
</div>

<!-- PRESTIGE POPUP -->
<div id="prestigeModal">
  <div id="prestigeBox">
    <h2>Prestige?</h2>

    <p class="green">✔ Unlock 3 new upgrades</p>
    <p class="green">✔ +30% permanent cola boost</p>
    <p class="red">❌ Lose ALL upgrades</p>

    <button onclick="doPrestige()">YES</button>
    <button onclick="closePrestige()">NO</button>
  </div>
</div>

<script>
let cola = 0;
let allTime = 0;
let clickPower = 1;
let auto = 0;
let prestigeLevel = 0;
let boost = 1;

const colaBtn = document.getElementById("cola");

/* CLICK */
colaBtn.onclick = (e) => {
  let gain = clickPower * boost;

  cola += gain;
  allTime += gain;

  float(e, "+" + gain.toFixed(1));
  update();
};

/* FLOAT */
function float(e,text){
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = text;

  f.style.left = e.clientX + "px";
  f.style.top = e.clientY + "px";

  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* UPGRADES */
function buyClick(){
  if(cola >= 10){
    cola -= 10;
    clickPower++;
    update();
  }
}

function buyAuto(){
  if(cola >= 25){
    cola -= 25;
    auto++;
    update();
  }
}

function buyFactory(){
  if(cola >= 200){
    cola -= 200;
    auto += 30;
    update();
  }
}

function buyGalaxy(){
  if(cola >= 500){
    cola -= 500;
    clickPower += 100;
    update();
  }
}

/* AUTO */
setInterval(()=>{
  cola += auto * boost;
  allTime += auto * boost;
  update();
},1000);

/* PANELS */
function openTab(id){
  ["shop","settings","leader"].forEach(p=>{
    document.getElementById(p).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

/* PRESTIGE UI */
function openPrestige(){
  document.getElementById("prestigeModal").style.display = "flex";
}

function closePrestige(){
  document.getElementById("prestigeModal").style.display = "none";
}

/* PRESTIGE LOGIC */
function doPrestige(){
  if(allTime < 1000){
    alert("Need 1000 cola!");
    return;
  }

  prestigeLevel++;
  boost *= 1.3;

  cola = 0;
  clickPower = 1;
  auto = 0;

  alert("Prestiged! +30% boost unlocked ⭐");

  closePrestige();
  update();
}

/* LEADERBOARD */
function updateBoard(){
  let fake = [
    ["You", allTime],
    ["Player2", 5000],
    ["Player3", 3000]
  ];

  fake.sort((a,b)=>b[1]-a[1]);

  document.getElementById("board").innerHTML =
    fake.map(p=>`<p>${p[0]} - ${p[1].toFixed(0)}</p>`).join("");
}

/* UPDATE */
function update(){
  document.getElementById("allTime").innerText = Math.floor(allTime);
  document.getElementById("prestige").innerText = prestigeLevel;
  updateBoard();
}
</script>

</body>
</html>
