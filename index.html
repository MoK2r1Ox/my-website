<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥤 REBIRTH COLA | Ascend & Evolve</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            background: radial-gradient(circle at 30% 20%, #0a0f1f, #020408);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.4s ease;
        }

        /* Clean dark theme - background stays dark, cola changes */
        body {
            background: radial-gradient(circle at 30% 20%, #0f1722, #03050b);
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 15px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            z-index: 100;
            border-left: 4px solid #ff7e3a;
            font-family: monospace;
        }
        #totalDisplay {
            position: fixed;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            border-right: 4px solid #ffaa44;
        }
        #prestigeBadge {
            position: fixed;
            top: 85px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #e6c8ff;
            border-right: 3px solid #c084fc;
            z-index: 100;
        }
        .menu-bar {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            z-index: 200;
        }
        .menu-btn {
            background: #1e293bdd;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa6644;
            padding: 10px 26px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #f5e2c1;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
        }
        .menu-btn:active { transform: scale(0.96); }
        #colaCenter {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        /* NEW COLA ICON - modern sleek bottle */
        #cola {
            font-size: 200px;
            cursor: pointer;
            filter: drop-shadow(0 0 25px rgba(255,100,30,0.6));
            transition: transform 0.07s cubic-bezier(0.2, 1.2, 0.8, 1);
            background: none;
            display: inline-block;
        }
        #cola:active { transform: scale(0.92); }
        
        /* Panel styles */
        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            max-width: 88vw;
            background: #0f1722ea;
            backdrop-filter: blur(20px);
            border-radius: 38px;
            padding: 20px 18px;
            border: 1px solid #ffaa6680;
            box-shadow: 0 25px 40px black;
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 10px;
            color: #fff0e0;
        }
        .panel h3 { margin: 0 0 8px; text-align: center; color: #ffcf9a; }
        .panel button {
            background: #3e2a1f;
            border: none;
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.07s linear;
        }
        .panel button:active { transform: scale(0.97); background: #5e3e2a; }
        .panel button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .close-panel { background: #7a3a28 !important; margin-top: 8px; }
        hr { border-color: #ffb34760; margin: 8px 0; }
        .prestige-card {
            background: #1e293b;
            border-left: 5px solid #ffb347;
            padding: 12px 12px;
            border-radius: 28px;
            margin: 8px 0;
        }
        .prestige-highlight { color: #ffcc88; font-weight: bold; }
        .float {
            position: fixed;
            font-weight: bold;
            color: #fff0aa;
            text-shadow: 0 0 8px #ff8800;
            animation: floatPop 1s forwards;
            pointer-events: none;
            font-size: 1.6rem;
            z-index: 1000;
        }
        @keyframes floatPop {
            0% { opacity: 1; transform: translateY(0) scale(0.7);}
            100% { opacity: 0; transform: translateY(-140px) scale(1.3);}
        }
        .click-effect {
            animation: colaPop 0.1s ease-out;
        }
        @keyframes colaPop {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,100,30,0.8));}
            50% { transform: scale(1.1); filter: drop-shadow(0 0 40px #ffaa44);}
            100% { transform: scale(1); }
        }
        .warning-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444dd;
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 400;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            font-size: 0.9rem;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 30px; }
            70% { opacity: 1; }
            100% { opacity: 0; bottom: 80px; visibility: hidden; }
        }
        .locked-notice { font-size: 0.8rem; color: #ffaa88; text-align: center; }
        
        /* rebirth animation */
        @keyframes rebirthGlow {
            0% { filter: drop-shadow(0 0 0px gold); transform: scale(1);}
            50% { filter: drop-shadow(0 0 50px #ffcc44); transform: scale(1.2);}
            100% { filter: drop-shadow(0 0 20px rgba(255,100,30,0.6)); transform: scale(1);}
        }
        .rebirth-flash {
            animation: rebirthGlow 0.8s ease-out;
        }
    </style>
</head>
<body>

<div id="hud">🥤 COLA: <span id="colaCount">0</span></div>
<div id="totalDisplay">📈 TOTAL: <span id="allTime">0</span></div>
<div id="prestigeBadge">🌀 REBIRTH <span id="prestigeLevel">0</span> &nbsp;| 💪 BONUS +<span id="prestigeBonus">0</span>%</div>

<div class="menu-bar">
    <button class="menu-btn" onclick="openPanel('shopPanel')">🏪 UPGRADES</button>
    <button class="menu-btn" onclick="openPanel('rebirthPanel')">🌀 REBIRTH</button>
    <button class="menu-btn" onclick="openPanel('settingsPanel')">⚙️ SETTINGS</button>
</div>

<!-- UPGRADES PANEL -->
<div id="shopPanel" class="panel">
    <h3>🍫 CLICKER UPGRADES</h3>
    <button onclick="buyClickPower()">🔨 +1 Base Click (Cost: <span id="clickCost">10</span>)</button>
    <button onclick="buyQuantum()">⚛️ Quantum Core +50 (Cost: <span id="quantumCost">450</span>)</button>
    <hr>
    <h3>🏭 AUTO PRODUCERS</h3>
    <button onclick="buySiphon()">🥤 Auto Siphon +1/sec (Cost: <span id="autoCost">30</span>)</button>
    <button onclick="buyBottler()">🏭 Bottling Plant +8/sec (Cost: <span id="factoryCost">220</span>)</button>
    <button onclick="buyMegaTank()">🌀 Mega Tank +50/sec (Cost: <span id="megaCost">1200</span>)</button>
    
    <hr id="rebirthUpgradeDivider" style="display: none;">
    <div id="rebirthUpgradesContainer">
        <h3 id="rebirthUpgradeTitle" style="display: none;">✨ ASCENDED LEGACY UPGRADES</h3>
        <button id="rebirthUpgrade1" style="display: none; background: #5e3a6a;" onclick="buyRebirthUpgrade(1)">🌌 Cosmic Relic: +15% Global (Cost: <span id="rebirthUpgrade1Cost">800</span>)</button>
        <button id="rebirthUpgrade2" style="display: none; background: #2a5f6a;" onclick="buyRebirthUpgrade(2)">💫 Void Essence: +25% Global (Cost: <span id="rebirthUpgrade2Cost">5000</span>)</button>
        <button id="rebirthUpgrade3" style="display: none; background: #8a6a2a;" onclick="buyRebirthUpgrade(3)">👑 Eternal Crown: +50% Global (Cost: <span id="rebirthUpgrade3Cost">25000</span>)</button>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">✖ CLOSE</button>
</div>

<!-- REBIRTH PANEL - Only shows current available rebirth -->
<div id="rebirthPanel" class="panel">
    <h3>🌀 REBIRTH - EVOLVE YOUR COLA</h3>
    <div id="rebirthInfo" class="prestige-card">
        <div id="rebirthDescription"></div>
        <button id="rebirthActionBtn" onclick="performRebirth()" style="margin-top: 12px; background: #c97e3a;">🌀 ASCEND & REBIRTH</button>
        <div id="rebirthWarning" class="locked-notice" style="margin-top: 8px;"></div>
    </div>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel">
    <h3>🎧 AUDIO</h3>
    <button onclick="toggleMusic()">🎵 Toggle Music</button>
    <button onclick="toggleSFX()">🔊 Toggle SFX</button>
    <p>🔊 Master Volume</p>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.3">
    <hr>
    <p><em>🌀 Rebirth changes your COLA ICON permanently!</em><br>⚡ Anti-auto-clicker active.</p>
    <button class="close-panel" onclick="closeAllPanels()">CLOSE</button>
</div>

<div id="colaCenter">
    <div id="cola">🧃</div>
</div>

<script>
    // ------------------- GAME STATE -------------------
    let cola = 0;
    let totalAllTime = 0;
    let baseClickPower = 1;
    let quantumActive = false;
    let autoSiphonCount = 0;
    let bottlerCount = 0;
    let megaTankCount = 0;
    
    // Rebirth system (instead of prestige)
    let rebirthTier = 0;      // 0,1,2,3
    let globalBonusPercent = 0;
    
    // Rebirth-exclusive upgrades
    let rebirthUpgradeBought = [false, false, false];
    let rebirthUpgradeCost = [0, 800, 5000, 25000];
    
    // Upgrade costs
    let clickUpgradeLevel = 0;
    let clickCost = 10;
    let quantumCost = 450;
    let siphonCost = 30;
    let bottlerCost = 220;
    let megaCost = 1200;
    
    // ---------- ANTI AUTO-CLICKER SYSTEM ----------
    let clickTimestamps = [];
    let isClickLocked = false;
    let clickLockTimer = null;
    const MAX_CLICKS_PER_SECOND = 12;
    const LOCK_DURATION = 1800;
    
    function antiAutoClickerCheck() {
        const now = Date.now();
        clickTimestamps.push(now);
        if(clickTimestamps.length > 15) clickTimestamps.shift();
        let recent = clickTimestamps.filter(t => (now - t) <= 1000);
        if(recent.length > MAX_CLICKS_PER_SECOND) {
            if(!isClickLocked) {
                isClickLocked = true;
                showWarningMessage("⚠️ AUTO-CLICKER DETECTED! Click locked for 1.8s ⚠️");
                if(clickLockTimer) clearTimeout(clickLockTimer);
                clickLockTimer = setTimeout(() => {
                    isClickLocked = false;
                    clickTimestamps = [];
                    showWarningMessage("🔓 Click unlocked! Enjoy 🧃");
                }, LOCK_DURATION);
                return false;
            }
            return false;
        }
        return true;
    }
    
    function showWarningMessage(msg) {
        let div = document.createElement("div");
        div.className = "warning-popup";
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2200);
    }
    
    // Audio
    let musicOn = true;
    let sfxOn = true;
    let volume = 0.3;
    let music = new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12b5f1b8a1.mp3");
    music.loop = true;
    music.volume = volume;
    
    function playClickSound() {
        if(!sfxOn || isClickLocked) return;
        let snd = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c1b6d4b4d4.mp3");
        snd.volume = volume;
        snd.play().catch(e=>{});
    }
    function playUpgradeSound() {
        if(!sfxOn) return;
        let snd = new Audio("https://cdn.pixabay.com/audio/2022/05/16/audio_8b6a7c8f2c.mp3");
        snd.volume = volume;
        snd.play().catch(e=>{});
    }
    music.play().catch(()=>console.log("click to enable music"));
    
    function getTotalGlobalMultiplier() {
        let bonus = globalBonusPercent;
        if(rebirthUpgradeBought[1]) bonus += 15;
        if(rebirthUpgradeBought[2]) bonus += 25;
        if(rebirthUpgradeBought[3]) bonus += 50;
        return 1 + (bonus / 100);
    }
    
    function getFinalClickPower() {
        let base = baseClickPower;
        if(quantumActive) base += 50;
        let total = Math.floor(base * getTotalGlobalMultiplier());
        return total < 1 ? 1 : total;
    }
    
    function getAutoIncome() {
        let auto = autoSiphonCount + (bottlerCount * 8) + (megaTankCount * 50);
        auto = Math.floor(auto * getTotalGlobalMultiplier());
        return auto;
    }
    
    // COLA ICONS that change ONLY on rebirth (no background changes)
    function getColaEmoji() {
        if(rebirthTier === 0) return "🧃";     // Juice box / classic cola
        if(rebirthTier === 1) return "🍷";     // Galaxy cola (dark mystic)
        if(rebirthTier === 2) return "🍾";     // Nebula cola (sparkling)
        return "🏆";                           // Stellar cola (trophy / legendary)
    }
    
    function getColaName() {
        if(rebirthTier === 0) return "Classic Cola";
        if(rebirthTier === 1) return "Galaxy Cola";
        if(rebirthTier === 2) return "Nebula Cola";
        return "Stellar Cola";
    }
    
    function updateUI() {
        document.getElementById("colaCount").innerText = Math.floor(cola);
        document.getElementById("allTime").innerText = Math.floor(totalAllTime);
        document.getElementById("prestigeLevel").innerText = rebirthTier;
        document.getElementById("prestigeBonus").innerText = globalBonusPercent;
        
        document.getElementById("clickCost").innerText = clickCost;
        document.getElementById("quantumCost").innerText = quantumCost;
        document.getElementById("autoCost").innerText = siphonCost;
        document.getElementById("factoryCost").innerText = bottlerCost;
        document.getElementById("megaCost").innerText = megaCost;
        
        // Show rebirth upgrades based on tier
        let divider = document.getElementById("rebirthUpgradeDivider");
        let title = document.getElementById("rebirthUpgradeTitle");
        let btn1 = document.getElementById("rebirthUpgrade1");
        let btn2 = document.getElementById("rebirthUpgrade2");
        let btn3 = document.getElementById("rebirthUpgrade3");
        
        if(rebirthTier >= 1) {
            divider.style.display = "block";
            title.style.display = "block";
            btn1.style.display = "block";
            btn1.disabled = rebirthUpgradeBought[1];
            document.getElementById("rebirthUpgrade1Cost").innerText = rebirthUpgradeCost[1];
        } else { btn1.style.display = "none"; }
        
        if(rebirthTier >= 2) {
            btn2.style.display = "block";
            btn2.disabled = rebirthUpgradeBought[2];
            document.getElementById("rebirthUpgrade2Cost").innerText = rebirthUpgradeCost[2];
        } else { btn2.style.display = "none"; }
        
        if(rebirthTier >= 3) {
            btn3.style.display = "block";
            btn3.disabled = rebirthUpgradeBought[3];
            document.getElementById("rebirthUpgrade3Cost").innerText = rebirthUpgradeCost[3];
        } else { btn3.style.display = "none"; }
        
        updateRebirthPanelDescription();
        
        // UPDATE COLA ICON (the only thing that changes visually)
        let colaDiv = document.getElementById("cola");
        colaDiv.innerText = getColaEmoji();
        document.title = `${getColaName()} - ${Math.floor(cola)} cola`;
    }
    
    function updateRebirthPanelDescription() {
        let descDiv = document.getElementById("rebirthDescription");
        let actionBtn = document.getElementById("rebirthActionBtn");
        let warningDiv = document.getElementById("rebirthWarning");
        
        if(rebirthTier === 0) {
            descDiv.innerHTML = `<span class="prestige-highlight">🌀 1st REBIRTH: GALAXY COLA</span><br>
            ➤ Become <strong>Galaxy Cola</strong>! +30% permanent bonus!<br>
            ➤ Unlock <strong>3 cosmic upgrades</strong> in shop!<br>
            ➤ Cola icon changes: 🧃 → 🍷<br>
            ➤ Requirement: 10,000 total cola<br>
            <span style="color:#ffaa66;">⚠️ Reset all upgrades & cola, keep total & bonus!</span>`;
            if(totalAllTime >= 10000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ Ready to Rebirth! Become Galaxy Cola (+30%)";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${10000 - totalAllTime} more total cola.`;
            }
        } 
        else if(rebirthTier === 1) {
            descDiv.innerHTML = `<span class="prestige-highlight">🌀 2nd REBIRTH: NEBULA COLA</span><br>
            ➤ Evolve to <strong>Nebula Cola</strong>! +30% more (total +60%)!<br>
            ➤ Unlock <strong>Nebula-tier relics</strong>!<br>
            ➤ Cola icon changes: 🍷 → 🍾<br>
            ➤ Requirement: 100,000 total cola<br>`;
            if(totalAllTime >= 100000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ Ready for Nebula Rebirth! +30% stacking.";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${100000 - totalAllTime} more total cola.`;
            }
        }
        else if(rebirthTier === 2) {
            descDiv.innerHTML = `<span class="prestige-highlight">🌀 3rd REBIRTH: STELLAR COLA</span><br>
            ➤ Ascend to <strong>Stellar Cola</strong>! +30% more (total +90%)!<br>
            ➤ Unlock <strong>Eternal Crown upgrade</strong>!<br>
            ➤ Cola icon becomes 🏆<br>
            ➤ Requirement: 1,000,000 total cola<br>`;
            if(totalAllTime >= 1000000) {
                actionBtn.disabled = false;
                warningDiv.innerText = "✅ ULTIMATE REBIRTH! Become Stellar Cola.";
            } else {
                actionBtn.disabled = true;
                warningDiv.innerText = `🔒 Need ${1000000 - totalAllTime} more total cola.`;
            }
        }
        else {
            descDiv.innerHTML = `<span class="prestige-highlight">✨ COSMIC LEGEND</span><br>
            You are <strong>Stellar Cola Master</strong>! Max rebirth reached.<br>
            Keep buying legacy upgrades! +90% permanent bonus!`;
            actionBtn.disabled = true;
            actionBtn.innerText = "🌟 MAXED";
            warningDiv.innerText = "You have achieved ultimate cola form!";
        }
    }
    
    function performRebirth() {
        let canRebirth = false;
        let newTier = 0;
        if(rebirthTier === 0 && totalAllTime >= 10000) { canRebirth = true; newTier = 1; }
        else if(rebirthTier === 1 && totalAllTime >= 100000) { canRebirth = true; newTier = 2; }
        else if(rebirthTier === 2 && totalAllTime >= 1000000) { canRebirth = true; newTier = 3; }
        
        if(!canRebirth) {
            showFloatingText("❌ Rebirth requirements not met!", window.innerWidth/2, 120);
            return;
        }
        
        let newBonus = globalBonusPercent + 30;
        let newName = (newTier === 1) ? "GALAXY COLA" : (newTier === 2) ? "NEBULA COLA" : "STELLAR COLA";
        if(!confirm(`🌀 REBIRTH TO ${newName}?\n\n+30% permanent bonus (total +${newBonus}%).\nYou lose all cola, click upgrades, auto producers.\nBut unlock cosmic relics!\nYour cola icon will change permanently!\n\nContinue?`)) return;
        
        // Reset progress
        cola = 0;
        baseClickPower = 1;
        clickUpgradeLevel = 0;
        quantumActive = false;
        autoSiphonCount = 0;
        bottlerCount = 0;
        megaTankCount = 0;
        clickCost = 10;
        quantumCost = 450;
        siphonCost = 30;
        bottlerCost = 220;
        megaCost = 1200;
        
        globalBonusPercent += 30;
        rebirthTier = newTier;
        
        // Visual rebirth animation on cola
        let colaElement = document.getElementById("cola");
        colaElement.classList.add("rebirth-flash");
        setTimeout(() => colaElement.classList.remove("rebirth-flash"), 800);
        
        playUpgradeSound();
        updateUI();
        closeAllPanels();
        showFloatingText(`🌀 REBIRTH ${newTier}: ${newName} ACHIEVED! +30% PERMANENT BONUS!`, window.innerWidth/2, 100);
    }
    
    function buyRebirthUpgrade(tier) {
        if(rebirthUpgradeBought[tier]) {
            showFloatingText("Already own this relic!",0,0);
            return;
        }
        let cost = rebirthUpgradeCost[tier];
        if(cola >= cost) {
            cola -= cost;
            rebirthUpgradeBought[tier] = true;
            playUpgradeSound();
            let bonusText = tier===1?"+15%":tier===2?"+25%":"+50%";
            showFloatingText(`✨ Ascended Relic acquired! ${bonusText} global bonus!`,0,0);
            updateUI();
        } else {
            showFloatingText(`❌ Need ${cost} cola!`,0,0);
        }
    }
    
    function buyClickPower() {
        if(cola >= clickCost) {
            cola -= clickCost;
            baseClickPower++;
            clickUpgradeLevel++;
            clickCost = Math.floor(10 + baseClickPower * 5);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Not enough cola!",0,0);
    }
    function buyQuantum() {
        if(!quantumActive && cola >= quantumCost) {
            cola -= quantumCost;
            quantumActive = true;
            playUpgradeSound();
            updateUI();
        } else if(quantumActive) showFloatingText("⚛️ Already owned!",0,0);
        else showFloatingText("❌ Need cola",0,0);
    }
    function buySiphon() {
        if(cola >= siphonCost) {
            cola -= siphonCost;
            autoSiphonCount++;
            siphonCost = Math.floor(30 + autoSiphonCount * 10);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    function buyBottler() {
        if(cola >= bottlerCost) {
            cola -= bottlerCost;
            bottlerCount++;
            bottlerCost = Math.floor(220 + bottlerCount * 32);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    function buyMegaTank() {
        if(cola >= megaCost) {
            cola -= megaCost;
            megaTankCount++;
            megaCost = Math.floor(1200 + megaTankCount * 160);
            playUpgradeSound();
            updateUI();
        } else showFloatingText("❌ Need cola",0,0);
    }
    
    function showFloatingText(msg, x, y) {
        let f = document.createElement("div");
        f.className = "float";
        f.innerText = msg;
        let posX = x || (window.innerWidth/2 + (Math.random() * 100 - 50));
        let posY = y || (window.innerHeight/2 - 60 + (Math.random() * 90));
        f.style.left = posX + "px";
        f.style.top = posY + "px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(), 1000);
    }
    
    function onColaClick(e) {
        if(isClickLocked) {
            showWarningMessage("⛔ Click locked by anti-cheat! Wait...");
            return;
        }
        if(!antiAutoClickerCheck()) return;
        
        let gain = getFinalClickPower();
        cola += gain;
        totalAllTime += gain;
        playClickSound();
        
        let colaDiv = document.getElementById("cola");
        colaDiv.classList.add("click-effect");
        setTimeout(()=> colaDiv.classList.remove("click-effect"), 100);
        
        let rect = colaDiv.getBoundingClientRect();
        showFloatingText(`+${gain}`, rect.left+rect.width/2, rect.top+rect.height/2-25);
        updateUI();
    }
    
    setInterval(() => {
        let income = getAutoIncome();
        if(income > 0 && !isClickLocked) {
            cola += income;
            totalAllTime += income;
            updateUI();
        }
    }, 1000);
    
    function openPanel(id) {
        closeAllPanels();
        let panel = document.getElementById(id);
        if(panel) panel.style.display = "flex";
    }
    function closeAllPanels() {
        document.querySelectorAll('.panel').forEach(p => p.style.display = "none");
    }
    function toggleMusic() {
        musicOn = !musicOn;
        if(musicOn) music.play().catch(e=>{});
        else music.pause();
    }
    function toggleSFX() { sfxOn = !sfxOn; }
    function setVolume(v) {
        volume = v;
        music.volume = volume;
    }
    
    document.getElementById("cola").addEventListener("click", onColaClick);
    document.getElementById("volumeSlider").addEventListener("input", (e) => setVolume(parseFloat(e.target.value)));
    
    updateUI();
</script>
</body>
</html>
